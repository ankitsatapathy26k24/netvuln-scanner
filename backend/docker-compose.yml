version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netvuln-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=false
      - USE_MOCK_SCANNER=${USE_MOCK_SCANNER:-false}
    depends_on:
      - redis
    networks:
      - netvuln-network
    volumes:
      - ./reports:/app/reports

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netvuln-worker
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - USE_MOCK_SCANNER=${USE_MOCK_SCANNER:-false}
    depends_on:
      - redis
    networks:
      - netvuln-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netvuln-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - netvuln-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: netvuln-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - netvuln-network

  # Nmap Scanner (with capabilities)
  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: netvuln-scanner
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      - redis
    networks:
      - netvuln-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined

networks:
  netvuln-network:
    driver: bridge

volumes:
  redis-data:
